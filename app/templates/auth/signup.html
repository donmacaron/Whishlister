{% extends "base.html" %}
{% block title %}Sign Up &mdash; Wishlister{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Create Account</h1>
    <form method="POST">
        <label for="username">Username <small>(min 3 chars)</small></label>
        <input id="username" type="text" name="username" required autofocus minlength="3">
        <label for="password">Password <small>(min 8 chars)</small></label>
        <input id="password" type="password" name="password" required minlength="8">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" type="password" name="confirm_password" required>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
    <p class="form-footer">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
