<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- black background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- bow top (cols 2-5, row 1) -->
  <rect x="8"  y="4"  width="16" height="4" fill="#cc0000"/>
  <!-- bow full-width (row 2) -->
  <rect x="0"  y="8"  width="32" height="4" fill="#cc0000"/>
  <!-- lid left -->
  <rect x="0"  y="12" width="12" height="4" fill="#f0f0f0"/>
  <!-- lid ribbon -->
  <rect x="12" y="12" width="8"  height="4" fill="#cc0000"/>
  <!-- lid right -->
  <rect x="20" y="12" width="12" height="4" fill="#f0f0f0"/>
  <!-- body left -->
  <rect x="0"  y="16" width="12" height="12" fill="#f0f0f0"/>
  <!-- body ribbon -->
  <rect x="12" y="16" width="8"  height="12" fill="#cc0000"/>
  <!-- body right -->
  <rect x="20" y="16" width="12" height="12" fill="#f0f0f0"/>
</svg>
